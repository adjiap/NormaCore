repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements

  - repo: local
    hooks:
      - id: black
        name: Format with Black
        language: system
        entry: uv run black
        types: [python]

      - id: isort
        name: Sort imports with isort
        language: system
        entry: uv run isort
        types: [python]

      - id: ruff
        name: Lint with Ruff
        language: system
        entry: uv run ruff check --fix
        types: [python]

      - id: detect-secrets
        name: Detect secrets
        language: system
        entry: uv run detect-secrets-hook
        args: ["--baseline", ".secrets.baseline"]

      - id: pytest
        name: Run tests
        language: system
        entry: uv run pytest
        pass_filenames: false
        stages: [pre-push]
